name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check packages and tests
        run: npm run typecheck && npm test

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Build packages
        run: npm run build:packages

      - name: Build documentation
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
          VITE_REPOSITORY_URL: https://github.com/${{ github.repository }}
        run: npm run build:docs

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/docs/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  report:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [build, deploy]
    steps:
      - name: Report deployment status
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          state=success
          description="GitHub Pages deployment succeeded"

          if [[ "$BUILD_RESULT" != "success" || "$DEPLOY_RESULT" != "success" ]]; then
            state=failure
            description="GitHub Pages deployment failed"
          fi

          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            -f description="$description" \
            -f context="github-pages/deploy"
