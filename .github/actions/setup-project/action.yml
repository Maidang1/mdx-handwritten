name: Set up MDX Handwritten
description: Install the canonical Node, npm, and locked project dependencies.

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v7
      with:
        node-version: 22.23.1
        cache: npm

    - name: Set up npm
      shell: bash
      run: npm install --global npm@11.9.0

    - name: Install dependencies
      shell: bash
      run: npm ci
